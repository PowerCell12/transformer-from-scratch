
services:
  db:
    image: postgres:18
    container_name: transformer-from-scratch-db
    environment: 
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mlflow_db
    volumes:
      - db_volume:/var/lib/postgresql/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-admin}", "-d", "mlflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  minio-init:
    image: minio/mc
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; 
      mc mb -p local/mlflow-artifacts;
      exit 0; "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on: 
          minio:
            condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: transformer-from-scratch-minio
    environment: 
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9010:9001"
    volumes:
      - minio_volume:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    container_name: transformer-from-scratch-mlflow
    ports: 
      - "5000:5000"
    environment: 
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_SERVER_ALLOWED_HOSTS: "${MLFLOW_HOST}"
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: "${MLFLOW_URL}"
    command: >
      /bin/sh -c "pip install psycopg2-binary boto3 && mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/mlflow_db
      --artifacts-destination s3://mlflow-artifacts
      --host 0.0.0.0
      --port 5000"
    restart: unless-stopped
    depends_on:
      db: 
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 20s
      timeout: 10s
      retries: 8

volumes:
  db_volume:
  minio_volume: